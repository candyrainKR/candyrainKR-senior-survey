<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내게 맞는 우유/유제품</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Topbar -->
    <header class="topbar">
      <button class="topbtn" id="btnBack" type="button">← 뒤로</button>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <button class="topbtn" id="btnHome" type="button">🏠 홈</button>
        <button class="topbtn" id="btnFull" type="button">⛶ 전체화면</button>
      </div>
    </header>

    <!-- Sounds -->
    <audio id="sfxClick" src="sounds/boing.mp3" preload="auto"></audio>
    <audio id="sfxTada" src="sounds/tada.mp3" preload="auto"></audio>

    <!-- HOME -->
    <section id="screen-home" class="screen active">
      <div class="card home-card kiosk-home">
        <div class="home-title">내게 맞는 우유/유제품</div>

        <div class="home-hero">
          <img src="images/home-hero.png" alt="우유/유제품 추천 테스트 안내 이미지">
        </div>

        <div class="home-actions">
          <button class="btn primary big xl" id="btnStart" type="button">테스트 시작하기</button>
        </div>
      </div>
    </section>

    <!-- QUIZ -->
    <section id="screen-quiz" class="screen">
      <div class="card quiz-card">
        <div class="quiz-head">
          <div class="progress" id="progressText">STEP 1 / 5</div>
          <div class="badge" id="stepBadge">STEP 1. 소화 편안함 체크</div>
        </div>

        <h2 class="q-title" id="qTitle"></h2>
        <p class="q-desc" id="qDesc"></p>

        <div class="q-media" id="qMedia" aria-hidden="true">
          <img id="qImage" alt="" />
        </div>

        <div class="choices" id="choices"></div>
      </div>
    </section>

    <!-- RESULT -->
    <section id="screen-result" class="screen">
      <div class="card result-card">
        <h1 class="result-title">결과</h1>

        <div class="result-layout">
          <div class="result-left">
            <div class="result-kicker">당신의 우유/유제품 타입은</div>
            <div class="result-type" id="resultName"></div>
            <div class="result-sub" id="resultSub"></div>

            <div class="result-hero">
              <img id="resultIcon" class="result-heroIcon" alt="결과 아이콘" />
            </div>

            <div class="result-reco">
              <div class="result-label">추천</div>
              <ul class="result-rec" id="resultRec"></ul>
            </div>
          </div>

          <div class="result-right">
            <div class="metric">
              <div class="metric-head">
                <div class="metric-title">섭취 패턴</div>
                <div class="metric-value"><span id="m1L">45</span>% / <span id="m1R">55</span>%</div>
              </div>
              <div class="metric-bar"><div class="metric-fill" id="m1Fill"></div></div>
              <div class="metric-foot">
                <span id="m1LabelL">한 번에 많이</span>
                <span id="m1LabelR">소량 자주</span>
              </div>
            </div>

            <div class="metric">
              <div class="metric-head">
                <div class="metric-title">선호 온도</div>
                <div class="metric-value"><span id="m2L">60</span>% / <span id="m2R">40</span>%</div>
              </div>
              <div class="metric-bar"><div class="metric-fill" id="m2Fill"></div></div>
              <div class="metric-foot">
                <span id="m2LabelL">차갑게</span>
                <span id="m2LabelR">상온도 OK</span>
              </div>
            </div>

            <div class="metric">
              <div class="metric-head">
                <div class="metric-title">부담 민감도</div>
                <div class="metric-value"><span id="m3L">35</span>% / <span id="m3R">65</span>%</div>
              </div>
              <div class="metric-bar"><div class="metric-fill" id="m3Fill"></div></div>
              <div class="metric-foot">
                <span id="m3LabelL">괜찮은 편</span>
                <span id="m3LabelR">민감한 편</span>
              </div>
            </div>

            <div class="metric">
              <div class="metric-head">
                <div class="metric-title">목표 성향</div>
                <div class="metric-value"><span id="m4L">45</span>% / <span id="m4R">55</span>%</div>
              </div>
              <div class="metric-bar"><div class="metric-fill" id="m4Fill"></div></div>
              <div class="metric-foot">
                <span id="m4LabelL">관리/루틴</span>
                <span id="m4LabelR">즐거움/취향</span>
              </div>
            </div>

            <div class="result-ment result-ment-right" id="resultMent"></div>
          </div>
        </div>

        <div class="result-actions">
          <button class="btn primary big" id="btnGoHome" type="button">메인으로 가기</button>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
